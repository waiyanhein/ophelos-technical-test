services:
  db-test:
    image: postgres:15
    platform: linux/arm64/v8
    container_name: ophelos-postgres-test
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ophelos_test_db
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - ophelos-test-network

networks:
  ophelos-test-network:
    driver: bridge
